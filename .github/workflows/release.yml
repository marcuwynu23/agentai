name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: agentai

jobs:
  build:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Verify Go and make
        run: go version && make --version

      - name: Get version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.tag.outputs.VERSION }}
          COMMIT: ${{ github.sha }}
        run: |
          export BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          make version-build BINARY_NAME=${{ env.BINARY_NAME }} DIST_DIR=bin

      - name: Create archive (Linux/macOS)
        if: matrix.os == 'linux' || matrix.os == 'darwin'
        shell: bash
        run: |
          cd bin
          tar -czf ../${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ${{ env.BINARY_NAME }}
          cd ..

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: bash
        run: |
          cd bin
          zip -r ../${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.zip ${{ env.BINARY_NAME }}.exe
          cd ..

      - name: Upload Release Asset (Linux/macOS)
        if: matrix.os == 'linux' || matrix.os == 'darwin'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          files: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          files: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.zip
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

